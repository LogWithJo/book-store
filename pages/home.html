        <title>Home - BookStore</title>
        <link rel="stylesheet" href="../styles/style.css" />

        rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/all.min.css" />

    <body class="bg-gray-100">
        <!-- Navbar -->
        <nav class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">📚 BookStore</h1>

        <div class="flex gap-4 text-gray-600">
            <a href="./profile.html" target="_blank"
            ><i class="fa-solid fa-user text-violet-400"></i
            ></a>
        </div>
        </nav>

        <!-- Filters
            <div class="p-4 flex flex-wrap gap-3">

        <div
        class="flex justify-center items-center gap-3 flex-col sm:flex-row p-3"
        >
        <input
            type="text"
            placeholder="Search books..."
            class="p-2 border rounded-lg"
            id="TitleSInput"
        />
        </div>

        <!-- Books Grid -->
        <div
        class="flex justify-center items-center w-full fixed w-full h-full translate-0.3 hidden"
        id="noBooks"
        >
        <div
            class="flex justify-center items-center flex-col gap-3 text-gray-600 capitalize"
        >
            <div><i class="fa-solid fa-book text-2xl"></i></div>
            <div>no books found</div>
        </div>
        </div>
        <div
        class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 p-4"
        id="booksCont"
        >
        <!-- Book Card -->
        <!-- <div class="bg-white p-4 rounded-xl shadow hover:shadow-lg">
                <div><img id="ima" alt=""></div>
                <h2 class="font-bold">Book Title</h2>
                <p class="text-sm text-gray-500">Author Name</p>
                <p class="text-yellow-500">⭐⭐⭐⭐</p>
                <p class="font-semibold text-blue-600">$20</p>

                <div class="flex gap-2 mt-3">
                <button
                    class="flex-1 bg-blue-600 text-white p-2 rounded-lg"
                    type="button"
                >
                    View
                </button>
                <button class="bg-pink-500 text-white p-2 rounded-lg" type="button">
                    ♥
                </button>
                </div>
            </div> -->
        </div>

        <!-- Floating Add Button -->
        <div
        id="addBookPop"
        
        class="cursor-pointer group fixed bottom-6 right-6 p-3 bg-blue-600 text-white rounded-full shadow-lg flex items-center gap-2"
        >
        <span
            class="absolute right-full bottom-full opacity-0 group-hover:opacity-100 transition duration-300 bg-black text-white text-sm px-2 py-1 rounded whitespace-nowrap"
        >
            press 9 to add book
        </span>

        <i class="fa-solid fa-plus"></i>
        </div>
        <!-- pop up -->
        <div
        class="fixed hidden inset-0 flex items-center justify-center z-50"
        id="addBookCont"
        >
        <!-- Overlay -->
        <div
            id="layout"
            class="absolute inset-0 bg-black/50 backdrop-blur-sm"
        ></div>

        <!-- Modal -->
        <div
            class="relative bg-white w-4/5 rounded-2xl shadow-xl p-6 flex flex-col gap-5 z-10"
        >
            <!-- Title -->
            <h2 class="text-xl font-semibold text-gray-800 text-center">
            Add New Book
            </h2>

            <!-- Inputs -->
            <div class="flex flex-col gap-3">
            <div class="relative w-full" id="gridCont">
                <div class="flex justify-center items-center">
                    <input
                        type="text"
                        id="bookTitleInput"
                        placeholder="Book Title"
                        class="border border-gray-300 rounded-lg w-full p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                    <div class=" text-gray-500 p-4" id="reload">
                        <i class="fa-solid fa-arrow-rotate-right"></i>
                    </div>
                </div>
    
                <div class="absolute top-full left-0 w-full bg-white rounded" id="results">
                </div>


            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 gap-3 overflow-y-scroll max-h-[300px]" id="searchGrid"></div>

            <!-- Button -->
            <button
            type="button"
            id="addBookBtn"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition"
            >
            Add Book
            </button>
        </div>
        </div>
        </div>
        <div class="fixed w-full h-full top-0 left-0 flex justify-center items-center hidden">
            <div class="layout absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
            <div class="bg-white rounded p-3 z-10">
                <div><img src="" alt=""></div>
                <div>
                    <div class="booktitle">booktitle</div>
                    <div>
                        <div><img src="" alt=""></div>
                        <div>authorname</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="bookAdded" class="fixed top-10 left-1/2 px-3 font-bold z-1000 rounded-2xl p-3 -translate-x-1/2 bg-green-400 duration-200 transition-all hidden">
            <div>book already added</div>
        </div>
        <script src="../scripts/index.js"></script>
